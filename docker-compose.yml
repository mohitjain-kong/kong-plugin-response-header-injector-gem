version: '3.8'

services:
  kong-database:
    image: postgres:15
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5432:5432"
    volumes:
      - kong_data:/var/lib/postgresql/data

  kong-migrations:
    image: kong:3.5
    container_name: kong-migrations
    depends_on:
      - kong-database
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_CASSANDRA_CONTACT_POINTS: kong-database
    command: "kong migrations bootstrap"
    restart: on-failure

  kong:
    image: kong:3.5
    container_name: kong
    depends_on:
      - kong-database
      - kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_CASSANDRA_CONTACT_POINTS: kong-database
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_PLUGINS: bundled,response-header-injector-gem
      KONG_PLUGINSERVER_NAMES: response-header-injector-gem
      KONG_PLUGINSERVER_RESPONSE_HEADER_INJECTOR_GEM_COMMAND: /opt/kong/plugins/response-header-injector-gem/bin/server
      KONG_PLUGINSERVER_RESPONSE_HEADER_INJECTOR_GEM_TIMEOUT: 5
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./plugins:/opt/kong/plugins
    restart: on-failure
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  konga:
    image: pantsel/konga:latest
    container_name: konga
    depends_on:
      - kong
    environment:
      NODE_ENV: development
    ports:
      - "1337:1337"
    restart: on-failure
    links:
      - kong
    environment:
      KONGA_HOOK_TIMEOUT: 30000
      KONGA_DB_ADAPTER: postgres
      KONGA_DB_HOST: kong-database
      KONGA_DB_PORT: 5432
      KONGA_DB_USER: kong
      KONGA_DB_PASSWORD: kong
      KONGA_DB_DATABASE: konga
    volumes:
      - konga_data:/app/konga

volumes:
  kong_data:
  konga_data: